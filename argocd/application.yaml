apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: managelab
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Priscilaz/openxavaFacturacion.git
    targetRevision: develop
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: managelab

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true